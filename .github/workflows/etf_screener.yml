name: ETF 수급 스크리너 v5.19

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 매일 07:00 KST (익일 기준)
  workflow_dispatch:          # 수동 실행 (MODE 입력 없음)

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: AUM 캐시 복원
        uses: actions/cache@v4
        with:
          path: etf_aum_cache.json
          key: etf-aum-cache-${{ github.run_id }}
          restore-keys: |
            etf-aum-cache-

      - name: ETF 스크리너 실행
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python etf_flow_screener.py

      - name: AUM 캐시 저장
        if: always()
        uses: actions/cache@v4
        with:
          path: etf_aum_cache.json
          key: etf-aum-cache-${{ github.run_id }}
