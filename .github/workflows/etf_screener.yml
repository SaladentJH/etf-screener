name: ETF 수급 스크리너 v5

on:
  schedule:
    # 월~금 매일 장마감 후 (07:30 UTC = 16:30 KST)
    - cron: '0 22 * * 1-5'   # 익일 07:00 KST
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (COLLECT / ANALYZE)'
        required: false
        default: ''
        type: string

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: AUM 캐시 복원
        uses: actions/cache@v4
        with:
          path: etf_aum_cache.json
          key: etf-aum-cache-${{ github.run_id }}
          restore-keys: |
            etf-aum-cache-

      - name: ETF 스크리너 실행
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ github.event.inputs.mode }}
        run: python etf_flow_screener.py

      - name: AUM 캐시 저장
        if: always()
        uses: actions/cache@v4
        with:
          path: etf_aum_cache.json
          key: etf-aum-cache-${{ github.run_id }}
